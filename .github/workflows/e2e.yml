name: E2E Tests

on:
  push:
    branches: [main]

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  e2e-tests:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: services/api-server/frontend/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -r shared/requirements.txt
          pip install -r services/permit-ingester/requirements.txt
          pip install -r services/bid-ingester/requirements.txt
          pip install -r services/license-scraper/requirements.txt
          pip install -r services/etl-pipeline/requirements.txt
          pip install -r services/api-server/requirements.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Build frontend
        working-directory: services/api-server/frontend
        run: |
          npm ci
          npm run build

      - name: Create .env file for docker compose
        run: |
          cat > .env << 'ENVEOF'
          GOOGLE_CLOUD_PROJECT=leadgen-mvp-local
          STORAGE_BACKEND=local
          LOCAL_STORAGE_PATH=/data/raw
          ENVEOF

      - name: Start all services with docker compose
        run: docker compose up -d --build

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for all services to become ready..."
          MAX_RETRIES=60
          RETRY_INTERVAL=3

          # Wait for Firestore emulator
          echo "Checking Firestore emulator..."
          for i in $(seq 1 $MAX_RETRIES); do
            if curl -s http://localhost:8681 > /dev/null 2>&1; then
              echo "  Firestore emulator is ready."
              break
            fi
            if [ "$i" -eq "$MAX_RETRIES" ]; then
              echo "  ERROR: Firestore emulator failed to start."
              docker compose logs firestore-emulator
              exit 1
            fi
            sleep $RETRY_INTERVAL
          done

          # Wait for API server
          echo "Checking API server..."
          for i in $(seq 1 $MAX_RETRIES); do
            if curl -s http://localhost:8000/health > /dev/null 2>&1; then
              echo "  API server is ready."
              break
            fi
            if [ "$i" -eq "$MAX_RETRIES" ]; then
              echo "  ERROR: API server failed to start."
              docker compose logs api-server
              exit 1
            fi
            sleep $RETRY_INTERVAL
          done

          # Wait for permit-ingester
          echo "Checking permit-ingester..."
          for i in $(seq 1 $MAX_RETRIES); do
            if curl -s http://localhost:8001/health > /dev/null 2>&1; then
              echo "  permit-ingester is ready."
              break
            fi
            if [ "$i" -eq "$MAX_RETRIES" ]; then
              echo "  ERROR: permit-ingester failed to start."
              docker compose logs permit-ingester
              exit 1
            fi
            sleep $RETRY_INTERVAL
          done

          # Wait for bid-ingester
          echo "Checking bid-ingester..."
          for i in $(seq 1 $MAX_RETRIES); do
            if curl -s http://localhost:8002/health > /dev/null 2>&1; then
              echo "  bid-ingester is ready."
              break
            fi
            if [ "$i" -eq "$MAX_RETRIES" ]; then
              echo "  ERROR: bid-ingester failed to start."
              docker compose logs bid-ingester
              exit 1
            fi
            sleep $RETRY_INTERVAL
          done

          # Wait for etl-pipeline
          echo "Checking etl-pipeline..."
          for i in $(seq 1 $MAX_RETRIES); do
            if curl -s http://localhost:8003/health > /dev/null 2>&1; then
              echo "  etl-pipeline is ready."
              break
            fi
            if [ "$i" -eq "$MAX_RETRIES" ]; then
              echo "  ERROR: etl-pipeline failed to start."
              docker compose logs etl-pipeline
              exit 1
            fi
            sleep $RETRY_INTERVAL
          done

          # Wait for license-scraper
          echo "Checking license-scraper..."
          for i in $(seq 1 $MAX_RETRIES); do
            if curl -s http://localhost:8004/health > /dev/null 2>&1; then
              echo "  license-scraper is ready."
              break
            fi
            if [ "$i" -eq "$MAX_RETRIES" ]; then
              echo "  ERROR: license-scraper failed to start."
              docker compose logs license-scraper
              exit 1
            fi
            sleep $RETRY_INTERVAL
          done

          echo "All services are ready."

      - name: Run E2E tests
        env:
          PYTHONPATH: ${{ github.workspace }}
          FIRESTORE_EMULATOR_HOST: localhost:8681
          GOOGLE_CLOUD_PROJECT: leadgen-mvp-local
          API_BASE_URL: http://localhost:8000
        run: |
          pytest tests/e2e -v -m e2e

      - name: Upload E2E test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: |
            tests/e2e/screenshots/
            tests/e2e/traces/
            test-results/
          retention-days: 7

      - name: Print service logs on failure
        if: failure()
        run: docker compose logs --tail=100

      - name: Tear down services
        if: always()
        run: docker compose down -v
