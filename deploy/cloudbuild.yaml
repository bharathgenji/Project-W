########################################################################
# Cloud Build configuration for Construction Lead Generation MVP
#
# Builds all 5 microservice Docker images, pushes them to Artifact
# Registry, and deploys each to Cloud Run.
#
# Substitution variables:
#   $PROJECT_ID       - GCP project ID (auto-populated by Cloud Build)
#   $COMMIT_SHA       - Git commit SHA (auto-populated by Cloud Build)
#   $_REGION          - Deployment region (default: us-central1)
#   $_REPOSITORY      - Artifact Registry repo name (default: leadgen)
#   $_CLOUD_RUN_SA    - Cloud Run service account email
#   $_ETL_PIPELINE_URL - Internal URL of the etl-pipeline service
########################################################################

substitutions:
  _REGION: us-central1
  _REPOSITORY: leadgen
  _CLOUD_RUN_SA: ""
  _ETL_PIPELINE_URL: ""

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
  dynamic_substitutions: true

steps:
  # ================================================================
  # Stage 1: Build Docker images (parallel)
  # ================================================================

  - id: build-permit-ingester
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/permit-ingester:${COMMIT_SHA}"
      - -t
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/permit-ingester:latest"
      - -f
      - services/permit-ingester/Dockerfile
      - .
    waitFor: ["-"]

  - id: build-bid-ingester
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/bid-ingester:${COMMIT_SHA}"
      - -t
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/bid-ingester:latest"
      - -f
      - services/bid-ingester/Dockerfile
      - .
    waitFor: ["-"]

  - id: build-license-scraper
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/license-scraper:${COMMIT_SHA}"
      - -t
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/license-scraper:latest"
      - -f
      - services/license-scraper/Dockerfile
      - .
    waitFor: ["-"]

  - id: build-etl-pipeline
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/etl-pipeline:${COMMIT_SHA}"
      - -t
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/etl-pipeline:latest"
      - -f
      - services/etl-pipeline/Dockerfile
      - .
    waitFor: ["-"]

  - id: build-api-server
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/api-server:${COMMIT_SHA}"
      - -t
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/api-server:latest"
      - -f
      - services/api-server/Dockerfile
      - .
    waitFor: ["-"]

  # ================================================================
  # Stage 2: Push images to Artifact Registry (after build)
  # ================================================================

  - id: push-permit-ingester
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/permit-ingester"
    waitFor: [build-permit-ingester]

  - id: push-bid-ingester
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/bid-ingester"
    waitFor: [build-bid-ingester]

  - id: push-license-scraper
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/license-scraper"
    waitFor: [build-license-scraper]

  - id: push-etl-pipeline
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/etl-pipeline"
    waitFor: [build-etl-pipeline]

  - id: push-api-server
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/api-server"
    waitFor: [build-api-server]

  # ================================================================
  # Stage 3: Deploy to Cloud Run (after push)
  # ================================================================

  - id: deploy-permit-ingester
    name: gcr.io/cloud-builders/gcloud
    args:
      - run
      - deploy
      - permit-ingester
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/permit-ingester:${COMMIT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --cpu=1
      - --memory=512Mi
      - --timeout=900
      - --concurrency=1
      - --max-instances=2
      - --min-instances=0
      - --no-allow-unauthenticated
      - --set-env-vars=GOOGLE_CLOUD_PROJECT=${PROJECT_ID},STORAGE_BACKEND=gcs,ETL_PIPELINE_URL=${_ETL_PIPELINE_URL}
      - --service-account=${_CLOUD_RUN_SA}
      - --quiet
    waitFor: [push-permit-ingester]

  - id: deploy-bid-ingester
    name: gcr.io/cloud-builders/gcloud
    args:
      - run
      - deploy
      - bid-ingester
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/bid-ingester:${COMMIT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --cpu=1
      - --memory=256Mi
      - --timeout=600
      - --max-instances=2
      - --min-instances=0
      - --no-allow-unauthenticated
      - --set-env-vars=GOOGLE_CLOUD_PROJECT=${PROJECT_ID},STORAGE_BACKEND=gcs,ETL_PIPELINE_URL=${_ETL_PIPELINE_URL}
      - --service-account=${_CLOUD_RUN_SA}
      - --quiet
    waitFor: [push-bid-ingester]

  - id: deploy-license-scraper
    name: gcr.io/cloud-builders/gcloud
    args:
      - run
      - deploy
      - license-scraper
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/license-scraper:${COMMIT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --cpu=2
      - --memory=2Gi
      - --timeout=1800
      - --max-instances=2
      - --min-instances=0
      - --no-allow-unauthenticated
      - --set-env-vars=GOOGLE_CLOUD_PROJECT=${PROJECT_ID},STORAGE_BACKEND=gcs,ETL_PIPELINE_URL=${_ETL_PIPELINE_URL}
      - --service-account=${_CLOUD_RUN_SA}
      - --quiet
    waitFor: [push-license-scraper]

  - id: deploy-etl-pipeline
    name: gcr.io/cloud-builders/gcloud
    args:
      - run
      - deploy
      - etl-pipeline
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/etl-pipeline:${COMMIT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --cpu=1
      - --memory=1Gi
      - --timeout=900
      - --max-instances=2
      - --min-instances=0
      - --no-allow-unauthenticated
      - --set-env-vars=GOOGLE_CLOUD_PROJECT=${PROJECT_ID},STORAGE_BACKEND=gcs
      - --service-account=${_CLOUD_RUN_SA}
      - --quiet
    waitFor: [push-etl-pipeline]

  - id: deploy-api-server
    name: gcr.io/cloud-builders/gcloud
    args:
      - run
      - deploy
      - api-server
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/api-server:${COMMIT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --cpu=1
      - --memory=512Mi
      - --concurrency=80
      - --max-instances=2
      - --min-instances=0
      - --allow-unauthenticated
      - --set-env-vars=GOOGLE_CLOUD_PROJECT=${PROJECT_ID}
      - --service-account=${_CLOUD_RUN_SA}
      - --quiet
    waitFor: [push-api-server]

# Images to be pushed (declared for Cloud Build image management)
images:
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/permit-ingester:${COMMIT_SHA}"
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/bid-ingester:${COMMIT_SHA}"
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/license-scraper:${COMMIT_SHA}"
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/etl-pipeline:${COMMIT_SHA}"
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/api-server:${COMMIT_SHA}"

timeout: 1800s
