portals:
  # ── TIER 1 — Verified live & current (tested March 2026) ─────────────────────
  # date_format: iso (default) | mdy (MM/DD/YYYY — use sort instead of where filter)

  - id: chicago
    domain: data.cityofchicago.org
    dataset_id: ydr8-5enu
    name: Chicago
    state: IL
    priority: critical
    field_map:
      permit_number: permit_
      permit_type: permit_type
      work_description: work_description
      address_street: street_number
      address_direction: street_direction
      address_street_name: street_name
      address_suffix: suffix
      address_city: _community_area
      estimated_cost: reported_cost
      contractor_name: contractor_1_name
      status: permit_status
      issued_date: issue_date
      lat: latitude
      lng: longitude

  - id: austin
    domain: data.austintexas.gov
    dataset_id: 3syk-w9eu
    name: Austin
    state: TX
    priority: critical
    field_map:
      permit_number: permit_number
      permit_type: permit_type_desc
      work_description: work_class
      address_street: original_address1
      estimated_cost: project_valuation
      contractor_name: contractor_company_name
      owner_name: applicant_fullname
      status: status_current
      issued_date: issue_date

  - id: sf
    domain: data.sfgov.org
    dataset_id: i98e-djp9
    name: San Francisco
    state: CA
    priority: critical
    field_map:
      permit_number: permit_number
      permit_type: permit_type
      work_description: description
      address_street: street_number
      address_street_name: street_name
      address_city: city
      estimated_cost: estimated_cost
      contractor_name: contractor_name
      owner_name: owner
      status: status
      filed_date: filed_date
      issued_date: issued_date
      lat: latitude
      lng: longitude

  - id: nyc
    domain: data.cityofnewyork.us
    dataset_id: ipu4-2q9a
    name: New York City
    state: NY
    priority: critical
    date_format: mdy          # dates stored as MM/DD/YYYY — use sort+limit, no where filter
    field_map:
      permit_number: job__
      permit_type: permit_type
      work_description: job_description
      address_street: house__
      address_street_name: street_name
      address_city: borough
      estimated_cost: initial_cost
      owner_name: owner_s_first_name
      owner_phone: owner_s_phone__
      contractor_name: applicant_s_first_name
      contractor_license: applicant_license__
      status: job_status
      filed_date: filing_date
      issued_date: issuance_date
      lat: latitude
      lng: longitude

  - id: san-diego
    domain: data.sandiegocounty.gov
    dataset_id: dyzh-7eat
    name: San Diego County
    state: CA
    priority: high
    field_map:
      permit_number: permit_number
      permit_type: permit_type
      work_description: description
      address_street: address
      estimated_cost: valuation
      status: status
      issued_date: issued_date

